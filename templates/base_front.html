<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yıldız Organizasyon | Premium Etkinlik Yönetimi</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-primary: #D4AF37;
            --gold-light: #FFDF00;
            --gold-dark: #B8860B;
            --bg-white: #FFFFFF;
            --text-dark: #2C2C2C;
        }

        body { background-color: var(--bg-white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* 1. TERTEMİZ BEYAZ AÇILIŞ (SPLASH SCREEN) */
        #splash-screen { 
            position: fixed; inset: 0; background: #FFFFFF; z-index: 9999; 
            display: flex; justify-content: center; align-items: center; 
            transition: opacity 0.8s ease, visibility 0.8s ease; 
        }

        .splash-content { text-align: center; }

        .coded-star-big {
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-primary) 100%);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            width: 140px; height: 140px; margin: 0 auto 25px auto;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.5));
            animation: pulseStar 2s infinite alternate;
        }

        @keyframes pulseStar { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* 2. NAVBAR VE MARKA AYARLARI */
        .navbar-custom { 
            background: #FFFFFF !important; 
            border-bottom: 2px solid #F8F8F8; 
            padding: 20px 0 !important; 
            transition: 0.4s;
        }

        .gold-brand-text {
            background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold-primary) 50%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            font-family: 'Playfair Display', serif;
            font-weight: 950; 
            font-size: 2.2rem !important; 
            letter-spacing: 2px;
            text-transform: uppercase;
            display: inline-block;
        }

        .coded-star-small {
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-primary) 100%);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            display: inline-block; 
            width: 40px !important; 
            height: 40px !important; 
            margin-right: 15px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
        }

        /* NAVBAR LİNKLERİ - YATAY VE TEK SATIR */
        .nav-link { 
            color: #222 !important; 
            font-weight: 800 !important; 
            text-transform: uppercase; 
            font-size: 1.1rem !important; 
            letter-spacing: 1px; 
            margin: 0 10px;
            white-space: nowrap; /* Yazıyı tek satırda tutar */
            transition: 0.3s;
        }
        .nav-link:hover { color: var(--gold-primary) !important; transform: translateY(-2px); }

        .navbar-collapse { flex-grow: 0; }
        .navbar-nav { flex-direction: row !important; }

        /* FOOTER */
        footer { background: #FFFFFF !important; padding: 50px 0; border-top: 1px solid #F0F0F0; text-align: center; margin-top: auto; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <div id="splash-screen">
        <div class="splash-content">
            <div class="coded-star-big"></div>
            <h2 class="gold-brand-text" style="font-size: 2.5rem;">YILDIZ ORGANİZASYON</h2>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg fixed-top navbar-custom">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/" style="text-decoration: none;">
                <div class="coded-star-small"></div>
                <span class="gold-brand-text">YILDIZ ORGANİZASYON</span>
            </a>

            <div class="collapse navbar-collapse d-flex" id="navbarNav">
                <ul class="navbar-nav ms-auto d-flex flex-row">
                    <li class="nav-item"><a class="nav-link" href="/">Ana Sayfa</a></li>
                    <li class="nav-item"><a class="nav-link" href="/hizmetler">Hizmetler</a></li>
                    <li class="nav-item"><a class="nav-link" href="/kurumsal">Kurumsal</a></li>
                    <li class="nav-item"><a class="nav-link" href="/galeri">Galeri</a></li>
                    <li class="nav-item"><a class="nav-link" href="/iletisim">İletişim</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1" style="padding-top: 100px;">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <div class="d-flex align-items-center justify-content-center mb-3">
                <div class="coded-star-small" style="width: 25px !important; height: 25px !important;"></div>
                <span class="gold-brand-text" style="font-size: 1.2rem !important;">YILDIZ ORGANİZASYON</span>
            </div>
            <p class="text-muted small">© 2026 TÜM HAKLARI SAKLIDIR.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => { splash.style.visibility = 'hidden'; }, 800);
                }
            }, 1000);
        });
    </script>
</body>
</html>
