<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yıldız Panel | Sistem Girişi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .login-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        
        .login-box { background: #0a0a0c; border: 1px solid rgba(212, 175, 55, 0.2); padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); text-align: center; }

        /* KOD TABANLI SİSTEM LOGOSU (AĞ BAĞIMSIZ) */
        .coded-star {
            background: linear-gradient(135deg, #F9D423 0%, #D4AF37 100%);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }
        .login-star { width: 60px; height: 60px; margin-bottom: 15px; animation: pulse 2s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(0.95); filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); } 100% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.8)); } }

        .login-title { font-family: 'Playfair Display', serif; color: #D4AF37; font-weight: 900; letter-spacing: 2px; margin-bottom: 5px; }
        .login-subtitle { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase;}

        .form-control { background: #111; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; transition: 0.3s; }
        .form-control:focus { background: #111; border-color: #D4AF37; color: #fff; box-shadow: 0 0 10px rgba(212,175,55,0.2); }
        
        .btn-login { background: linear-gradient(135deg, #F9D423 0%, #D4AF37 100%); color: #000; font-weight: 800; letter-spacing: 1px; padding: 12px; border: none; border-radius: 5px; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); transform: translateY(-2px); }
        
        .back-link { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.85rem; display: inline-block; margin-top: 25px; transition: 0.3s; }
        .back-link:hover { color: #D4AF37; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="coded-star login-star"></div>
            <h2 class="login-title">YILDIZ PANEL</h2>
            <p class="login-subtitle">Yönetici Giriş Ekranı</p>

            <form action="/login" method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label text-muted small mb-1">Kullanıcı Adı</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label text-muted small mb-1">Şifre</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn-login">SİSTEME GİRİŞ YAP</button>
            </form>
            <a href="/" class="back-link">← Ana Ekrana Dön</a>
        </div>
    </div>
</body>
</html>
